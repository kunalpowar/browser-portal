name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag override, for example v0.2.0"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  HOMEBREW_TAP_REPOSITORY: kunalpowar/homebrew-tap
  HOMEBREW_TAP_CASK_PATH: Casks/browser-portal.rb

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          MANUAL_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "$MANUAL_VERSION" ]]; then
            VERSION_TAG="$MANUAL_VERSION"
          else
            VERSION_TAG="$(./scripts/next-version.sh)"
          fi

          if [[ ! "$VERSION_TAG" =~ ^v[0-9]+(\.[0-9]+){2}([-.][A-Za-z0-9.]+)?$ ]]; then
            echo "Expected a semantic version like v0.1.0, got: $VERSION_TAG" >&2
            exit 1
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        run: ./scripts/make-release.sh "${{ steps.release_version.outputs.version_tag }}" "${{ github.repository }}"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ steps.release_version.outputs.version_tag }}
        run: |
          RELEASE_FILES=(
            "dist/release/Browser.Portal-${VERSION_TAG}.zip"
            "dist/release/Browser.Portal-${VERSION_TAG}.zip.sha256"
            "dist/release/browser-portal.rb"
          )

          if gh release view "$VERSION_TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "${RELEASE_FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "$VERSION_TAG" "${RELEASE_FILES[@]}" \
              --generate-notes \
              --title "$VERSION_TAG" \
              --target "${GITHUB_SHA}" \
              --repo "${GITHUB_REPOSITORY}"
          fi

      - name: Update Homebrew tap
        shell: bash
        env:
          VERSION_TAG: ${{ steps.release_version.outputs.version_tag }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured. Skipping tap update."
            exit 0
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" homebrew-tap
          mkdir -p "homebrew-tap/$(dirname "${HOMEBREW_TAP_CASK_PATH}")"
          cp dist/release/browser-portal.rb "homebrew-tap/${HOMEBREW_TAP_CASK_PATH}"

          if [[ ! -f homebrew-tap/README.md ]]; then
            printf '%s\n' \
              '# Homebrew Tap' \
              '' \
              'Install packages from this tap with:' \
              '' \
              '```bash' \
              'brew tap kunalpowar/tap' \
              '```' \
              > homebrew-tap/README.md
          fi

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md "${HOMEBREW_TAP_CASK_PATH}"

          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi

          git commit -m "Update Browser Portal to ${VERSION_TAG#v}"
          git push origin HEAD:main
