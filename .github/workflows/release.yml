name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPOSITORY: kunalpowar/homebrew-tap
  HOMEBREW_TAP_CASK_PATH: Casks/browser-portal.rb

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          else
            VERSION_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION_TAG" =~ ^v[0-9]+(\.[0-9]+){2}([-.][A-Za-z0-9.]+)?$ ]]; then
            echo "Expected a semantic version tag like v0.1.0, got: $VERSION_TAG" >&2
            exit 1
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        run: ./scripts/make-release.sh "${{ steps.release_version.outputs.version_tag }}" "${{ github.repository }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.version_tag }}
          files: |
            dist/release/Browser.Portal-${{ steps.release_version.outputs.version_tag }}.zip
            dist/release/Browser.Portal-${{ steps.release_version.outputs.version_tag }}.zip.sha256
            dist/release/browser-portal.rb
          generate_release_notes: true

  publish-homebrew-cask:
    needs: release
    runs-on: macos-14
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}

    steps:
      - name: Check out app repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          else
            VERSION_TAG="${GITHUB_REF_NAME}"
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: ./scripts/make-release.sh "${{ steps.release_version.outputs.version_tag }}" "${{ github.repository }}"

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask in tap repository
        shell: bash
        run: |
          mkdir -p "homebrew-tap/$(dirname "${HOMEBREW_TAP_CASK_PATH}")"
          cp dist/release/browser-portal.rb "homebrew-tap/${HOMEBREW_TAP_CASK_PATH}"

          if [[ ! -f homebrew-tap/README.md ]]; then
            printf '%s\n' \
              '# Homebrew Tap' \
              '' \
              'Install packages from this tap with:' \
              '' \
              '```bash' \
              'brew tap kunalpowar/tap' \
              '```' \
              > homebrew-tap/README.md
          fi

      - name: Commit and push tap update
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md "${HOMEBREW_TAP_CASK_PATH}"; then
            echo "No tap changes to commit."
            exit 0
          fi

          git add README.md "${HOMEBREW_TAP_CASK_PATH}"
          git commit -m "Update Browser Portal to ${VERSION_TAG#v}"
          git push origin HEAD
        env:
          VERSION_TAG: ${{ steps.release_version.outputs.version_tag }}
